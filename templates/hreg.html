<h3>Register Values:</h3>
<table style="width: 100%; border-collapse: collapse;">
    <thead>
    <tr style="text-align: left; border-bottom: 2px solid #ddd;">
        <th>Address</th>
        <th>Value (Dec)</th>
        <th>Hex</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody>
    {% for (addr, val) in registers %}
    <tr style="border-bottom: 1px solid #eee;">
        <td>{{ addr }}</td>
        <td>
            <input type="number"
                   name="value"
                   value="{{ val }}"
                   form="form-{{ addr }}"
                   style="width: 80px;">
        </td>
        <td>0x{{ "{:04X}"|format(val) }}</td>
        <td>
            <form id="form-{{ addr }}"
                  hx-post="/write"
                  hx-target="#status-{{ addr }}"
                  style="margin: 0;">
                <input type="hidden" name="address" value="{{ addr }}">
                <button type="submit" style="padding: 5px 10px; font-size: 0.8em;">Update</button>
                <span id="status-{{ addr }}"></span>
            </form>
        </td>
    </tr>
    {% endfor %}
    </tbody>
</table>
