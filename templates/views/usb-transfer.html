{% extends "base.html" %}

{% block header %}
<div id="app-header"
     hx-get="/ui/header?tab={{ Self::get_view().url() }}"
     hx-trigger="auth-changed"
     hx-swap="innerHTML">
    {% include "components/header.html" %}
</div>
{% endblock %}


{% block content %}

<div id="auth-modal"></div>

<div id="view-usb-transfer" class="bg-gray-100 p-5 rounded-lg mb-5 border border-gray-300">
    <div class="flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
        <div>
            <h2 class="text-2xl font-bold text-slate-700">USB transfer</h2>
            <p class="text-sm text-slate-500">Copy files between local storage and a mounted USB drive.</p>
        </div>
        <div class="flex items-center gap-2">
            <button
                type="button"
                hx-get="/usb-transfer/usb-list"
                hx-target="#usb-drive-list"
                hx-swap="innerHTML"
                hx-indicator="this"
                hx-disabled-elt=".usb-transfer-action"
                hx-sync="#view-usb-transfer:drop"
                class="usb-transfer-action group px-4 py-2 bg-slate-700 text-white rounded hover:bg-slate-800 disabled:opacity-50 disabled:cursor-not-allowed">
                <span class="group-[.htmx-request]:hidden">Refresh USB</span>
                <span class="hidden group-[.htmx-request]:inline">Refreshing...</span>
            </button>
        </div>
    </div>

    <div id="usb-transfer-toast" class="mt-3"></div>
    <div id="usb-transfer-modal"></div>
    <input type="hidden" id="usb-selected-mountpoint" name="usb_mountpoint" value="" />

    <div class="mt-4 grid gap-4 lg:grid-cols-2">
        <section class="rounded-lg border border-slate-200 bg-white/70 p-4">
            <div class="flex items-start justify-between gap-2 min-h-[3.25rem]">
                <div>
                    <div class="text-xs uppercase tracking-wide text-slate-500">Local</div>
                    <div class="text-lg font-semibold text-slate-700">Local files</div>
                </div>
            </div>
            <div id="usb-local-list"
                 class="mt-3"
                 hx-get="/usb-transfer/local-list"
                 hx-trigger="load, usb-transfer-reload-local"
                 hx-swap="innerHTML">
                Loading...
            </div>
        </section>

        <section class="rounded-lg border border-slate-200 bg-white/70 p-4">
            <div class="flex items-start justify-between gap-2 min-h-[3.25rem]">
                <div>
                    <div class="text-xs uppercase tracking-wide text-slate-500">USB</div>
                    <div class="text-lg font-semibold text-slate-700" id="usb-drive-header">
                        <span class="text-slate-400 font-medium">No drive detected</span>
                    </div>
                </div>
            </div>
            <div id="usb-drive-list"
                 class="mt-3"
                 hx-get="/usb-transfer/usb-list"
                 hx-trigger="load, usb-transfer-reload-usb"
                 hx-swap="innerHTML">
                Loading...
            </div>
        </section>
    </div>
</div>
{% endblock %}
