{% extends "base.html" %}

{% block content %}
{% include "components/header.html" %}

<div id="view-connections" class="bg-gray-100 p-5 rounded-lg mb-5 border border-gray-300">
    <h2 class="text-2xl font-bold text-slate-700 mb-6">System Registers</h2>

    <!-- The Grid -->
    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
        {% for reg in boolean_registers %}
        <!-- 
           Askama includes inherit context. 
           We extract the fields from the current iteration 'reg' 
           so the included template sees 'meta' and 'value'.
        -->
        {% let meta = reg.meta %}
        {% let value = reg.value %}
        {% include "components/boolean-read-only-register.html" %}
        {% endfor %}
    </div>

    <!-- 
      Global Modal Layer
      Placed here to ensure it exists within this view context.
      HTMX requests from the buttons above will target this ID.
    -->
    <div id="global-modal-layer"></div>
</div>
{% endblock %}
