{% extends "base.html" %}

{% block header %}
<div id="app-header"
     hx-get="/ui/header?tab={{ Self::get_view().url() }}"
     hx-trigger="auth-changed"
     hx-swap="innerHTML">
    {% include "components/header.html" %}
</div>
{% endblock %}


{% block content %}


<div id="view-run-cycle" class="bg-gray-100 p-4 rounded-lg mb-5 border border-gray-300 flex flex-col gap-4">
    <div class="flex justify-between mb-4">
        <h2 class="text-2xl font-bold text-slate-700 align-middle my-auto">Run Cycle</h2>
    </div>

    <form id="run-cycle-form"
          class="group">
        <div class="grid gap-3 md:grid-cols-[minmax(0,1fr)_minmax(0,1fr)_auto] md:items-end">
            <div>
                <label for="run-cycle-weld-profile" class="block text-sm font-medium mb-2">Weld Profile</label>
                <select id="run-cycle-weld-profile"
                        name="weld_profile"
                        required
                        class="w-full p-2 border border-gray-300 rounded bg-white text-2xl">
                    <option value="" {% if !self.has_selected_weld() %}selected{% endif %} disabled class="">
                        Select a weld profile
                    </option>
                    {% for profile in weld_profiles %}
                    <option value="{{ profile.name }}" {% if self.is_selected_weld(profile.name) %}selected{% endif %} class="">
                        {{ profile.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="run-cycle-motion-profile" class="block text-sm font-medium mb-2">Motion Profile</label>
                <select id="run-cycle-motion-profile"
                        name="motion_profile"
                        required
                        class="w-full p-2 border border-gray-300 rounded bg-white text-2xl">
                    <option value="" {% if !self.has_selected_motion() %}selected{% endif %} disabled class="">
                        Select a motion profile
                    </option>
                    {% for profile in motion_profiles %}
                    <option value="{{ profile.name }}" {% if self.is_selected_motion(profile.name) %}selected{% endif %} class="">
                        {{ profile.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="md:flex md:justify-end">
                <button id="run-cycle-load-button"
                        type="button"
                        hx-post="/run-cycle/load-profiles"
                        hx-include="#run-cycle-form"
                        hx-target="#run-cycle-feedback"
                        hx-swap="innerHTML"
                        hx-disabled-elt=".run-cycle-action"
                        hx-indicator="#run-cycle-action-indicator"
                        class="run-cycle-action w-full md:w-auto px-4 py-2
                            text-2xl
                            bg-amber-500 text-white border-none
                            cursor-pointer rounded
                            hover:bg-amber-600 font-bold
                            disabled:opacity-50 disabled:cursor-not-allowed">
                    Load Profiles
                </button>
            </div>
        </div>
    </form>


    <div id="run-cycle-selected-profiles"
         class="mt-3"
         hx-post="/run-cycle/selected-profiles"
         hx-include="#run-cycle-form"
         hx-trigger="load, change from:#run-cycle-form select"
         hx-swap="innerHTML">
        Loading profiles...
    </div>

    <div class="flex flex-wrap items-center justify-between gap-2">
        <div id="run-cycle-feedback" class="text-sm text-slate-600"></div>
        <div id="run-cycle-action-indicator"
             class="htmx-indicator inline-flex items-center gap-2 text-sm text-slate-500"
             aria-live="polite">
            <svg class="animate-spin h-4 w-4 text-slate-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>Working...</span>
        </div>
    </div>

    <div class="grid gap-3 lg:grid-cols-[2fr_1fr] lg:items-stretch">
        <div id="run-cycle-status"
             class="h-full"
             hx-get="/run-cycle/status"
             hx-trigger="load, every 500ms"
             hx-swap="morph:innerHTML">
            Loading...
        </div>
        <div id="run-cycle-controls" class="h-full rounded-lg border border-slate-200 bg-white/70 p-3">
            <div class="text-[11px] font-semibold uppercase tracking-wide text-slate-500">Cycle actions</div>
            <label class="mt-2 flex items-center gap-2 text-xl text-slate-600">
                <input id="run-cycle-use-adjustments"
                       type="checkbox"
                       name="use_adjusted_presets"
                       value="true"
                       class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500" />
                <span>Use adjusted presets</span>
            </label>
            <div id="run-cycle-run-actions" class="mt-2 grid gap-6 group">
                <button id="run-cycle-start-button"
                        type="button"
                        hx-post="/run-cycle/start"
                        hx-include="#run-cycle-form, #run-cycle-adjustments-form, #run-cycle-controls"
                        hx-target="#run-cycle-feedback"
                        hx-swap="innerHTML"
                        hx-disabled-elt=".run-cycle-action"
                        hx-indicator="#run-cycle-action-indicator, #run-cycle-run-actions"
                        class="run-cycle-action run-cycle-run-action w-full px-4 py-4 text-2xl bg-blue-600
                            text-white border-none cursor-pointer rounded font-bold
                            disabled:opacity-50 disabled:cursor-not-allowed
                            group-[.htmx-request]:opacity-70">
                    <span class="group-[.htmx-request]:hidden">Run Cycle</span>
                    <span class="hidden group-[.htmx-request]:inline">Starting...</span>
                </button>
                <button id="run-cycle-simulate-button"
                        type="button"
                        hx-post="/run-cycle/start-simulate"
                        hx-include="#run-cycle-form, #run-cycle-adjustments-form, #run-cycle-controls"
                        hx-target="#run-cycle-feedback"
                        hx-swap="innerHTML"
                        hx-disabled-elt=".run-cycle-action"
                        hx-indicator="#run-cycle-action-indicator, #run-cycle-run-actions"
                        class="run-cycle-action run-cycle-run-action w-full px-4 py-4 text-2xl bg-slate-600
                            text-white border-none cursor-pointer rounded font-bold
                            disabled:opacity-50 disabled:cursor-not-allowed
                            group-[.htmx-request]:opacity-70">
                    <span class="group-[.htmx-request]:hidden">Simulate Motion</span>
                    <span class="hidden group-[.htmx-request]:inline">Simulating...</span>
                </button>
            </div>
            <div class="mt-6 grid gap-6">
                <button id="run-cycle-go-to-start-button"
                        type="button"
                        hx-post="/run-cycle/go-to-start"
                        hx-vals="js:{
                            use_adjusted_presets: document.querySelector('#run-cycle-use-adjustments')?.checked ? 'true' : 'false',
                            'adjustments[{{ cycle_start_register_name }}]': (document.querySelector('[data-adjustment-key=&quot;{{ cycle_start_register_name }}&quot;]')?.value ?? 'None')}"
                        hx-target="#run-cycle-feedback"
                        hx-swap="innerHTML"
                        hx-disabled-elt=".run-cycle-action"
                        hx-indicator="#run-cycle-action-indicator"
                        class="run-cycle-action w-full px-4 py-4 text-2xl
                            bg-emerald-600 text-white border-none cursor-pointer
                            rounded font-bold disabled:opacity-50 disabled:cursor-not-allowed">
                    Go To Start Position
                </button>
            </div>
        </div>
    </div>

    <div id="run-cycle-analog-registers"
         class="flex-1 min-h-0"
         hx-get="/run-cycle/analog-registers"
         hx-trigger="load, run-cycle-presets-loaded"
         hx-swap="morph:innerHTML">
    </div>
</div>

<div id="global-modal-layer" hx-on:close-modal="this.innerHTML = ''"></div>
{% endblock %}
