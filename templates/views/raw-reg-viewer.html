{% extends "base.html" %}

{% block header %}
<div id="app-header"
     hx-get="/ui/header?tab={{ Self::get_view().url() }}"
     hx-trigger="auth-changed"
     hx-swap="innerHTML">
    {% include "components/header.html" %}
</div>
{% endblock %}


{% block content %}


<div id="view-operations">
    <div class="bg-gray-100 p-5 rounded-lg mb-5 border border-gray-300">
        <h2 class="text-xl font-bold mb-3">Read Registers</h2>
        <form hx-post="/read" hx-target="#read-result" class="flex gap-2 flex-wrap">
            <input
                type="number"
                name="address"
                autocomplete="off"
                placeholder="Start Address"
                value="0"
                required
                class="px-2.5 py-2 border border-gray-300 rounded">
            <input
                type="number"
                name="count"
                autocomplete="off"
                placeholder="Count"
                value="10"
                min="1"
                max="125"
                required
                class="px-2.5 py-2 border border-gray-300 rounded">
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white border-none cursor-pointer rounded hover:bg-blue-700">Read</button>
        </form>
        <div id="read-result" class="mt-2.5 p-2.5 bg-white rounded border border-gray-200"></div>
    </div>

    <div class="bg-gray-100 p-5 rounded-lg mb-5 border border-gray-300">
        <h2 class="text-xl font-bold mb-3">Write Register</h2>
        <form hx-post="/write" hx-target="#write-result" class="flex gap-2 flex-wrap">
            <input
                type="number"
                name="address"
                autocomplete="off"
                placeholder="Register Address"
                value="0"
                required
                class="px-2.5 py-2 border border-gray-300 rounded">
            <input
                type="number"
                name="value"
                autocomplete="off"
                placeholder="Value (0-65535)"
                min="0"
                max="65535"
                required
                class="px-2.5 py-2 border border-gray-300 rounded">
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white border-none cursor-pointer rounded hover:bg-blue-700">Write</button>
        </form>
        <div id="write-result" class="mt-2.5 p-2.5 bg-white rounded border border-gray-200"></div>
    </div>
</div>
{% endblock %}
