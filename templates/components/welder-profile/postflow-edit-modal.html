<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4"
     id="modal-backdrop"
     hx-preserve="true">

    <div class="absolute inset-0" onclick="document.getElementById('global-modal-layer').innerHTML = ''"></div>

    <div class="relative bg-white rounded-lg shadow-2xl w-full max-w-md border border-slate-300 z-10 animate-in fade-in zoom-in duration-200">

        <div class="flex justify-between items-center p-4 border-b border-slate-100 bg-slate-50 rounded-t-lg">
            <h3 class="font-bold font-mono text-lg text-slate-800">{{ meta.name }}</h3>
            <button onclick="document.getElementById('global-modal-layer').innerHTML = ''"
                    class="text-slate-400 hover:text-red-500 font-bold px-2 text-xl">&times;</button>
        </div>

        <div class="p-4 space-y-4">
            <div>
                <span class="text-xs font-bold uppercase text-slate-400 tracking-wider">Description</span>
                <p class="text-sm text-slate-700 leading-relaxed mt-1">
                    {{ meta.description }}
                </p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-50 p-2 rounded border border-slate-200">
                    <span class="text-xs font-bold uppercase text-slate-400">Type</span>
                    <div class="font-mono text-sm">{{ meta.address.register_type }}</div>
                </div>
                <div class="bg-slate-50 p-2 rounded border border-slate-200">
                    <span class="text-xs font-bold uppercase text-slate-400">Address</span>
                    <div class="font-mono text-sm">{{ meta.address.address }}</div>
                </div>
            </div>

            <!-- Hardcoded bounds as requested -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-50 p-2 rounded border border-slate-200">
                    <span class="text-xs font-bold uppercase text-slate-400">Min</span>
                    <div class="font-mono text-sm">0 s</div>
                </div>
                <div class="bg-slate-50 p-2 rounded border border-slate-200">
                    <span class="text-xs font-bold uppercase text-slate-400">Max</span>
                    <div class="font-mono text-sm">51 s</div>
                </div>
            </div>

            <div class="bg-blue-50 p-3 rounded border border-blue-200">
                <span class="text-xs font-bold uppercase text-slate-600 tracking-wider">Current Value</span>
                <div class="font-bold text-lg mt-1 text-slate-700">
                    {{ current_display_value() }}
                </div>
            </div>

            <form hx-post="/welder-profile/write/{{ register_name }}"
                  hx-swap="none"
                  onsubmit="setTimeout(() => document.getElementById('global-modal-layer').innerHTML = '', 100)">

                <!-- Use as_enum() directly (method on self), not on current_value -->
                <input type="hidden" name="value" id="submission_value" value="{{ as_enum().as_u16() }}">

                <div class="space-y-4" id="weld-controller">
                    <div class="flex gap-2">
                        <!-- Off Button (0) -->
                        <button type="button"
                                id="btn-off"
                                onclick="weldControl.setVal(0)"
                                data-active="{{ as_enum().is_off() }}"
                                class="flex-1 py-2 px-3 border rounded font-medium text-sm transition-colors
                                           data-[active=true]:bg-slate-600 data-[active=true]:text-white data-[active=true]:border-slate-600 data-[active=true]:shadow-inner
                                           bg-white text-slate-700 border-slate-300 hover:bg-slate-50">
                            OFF
                        </button>

                        <!-- Manual Button (1-50) -->
                        <button type="button"
                                id="btn-manual"
                                onclick="weldControl.clickManual()"
                                data-active="{{ as_enum().is_manual() }}"
                                class="flex-1 py-2 px-3 border rounded font-medium text-sm transition-colors
                                           data-[active=true]:bg-blue-600 data-[active=true]:text-white data-[active=true]:border-blue-600 data-[active=true]:shadow-inner
                                           bg-white text-blue-700 border-blue-200 hover:bg-blue-50">
                            MANUAL
                        </button>

                        <!-- Auto Button (51) -->
                        <button type="button"
                                id="btn-auto"
                                onclick="weldControl.setVal(51)"
                                data-active="{{ as_enum().is_auto() }}"
                                class="flex-1 py-2 px-3 border rounded font-medium text-sm transition-colors
                                           data-[active=true]:bg-green-600 data-[active=true]:text-white data-[active=true]:border-green-600 data-[active=true]:shadow-inner
                                           bg-white text-green-700 border-green-200 hover:bg-green-50">
                            AUTO
                        </button>
                    </div>

                    <label class="block">
                        <span class="text-sm font-bold text-slate-700">Value</span>
                        <div class="mt-1">
                            <!-- View A: Off - Hide if NOT off -->
                            <div id="view-off"
                                 class="w-full px-3 py-2 border border-slate-300 rounded font-mono text-lg bg-slate-100 text-slate-500 {% if !as_enum().is_off() %} hidden {% endif %}">
                                0 | Off
                            </div>

                            <!-- View B: Auto - Hide if NOT auto -->
                            <div id="view-auto"
                                 class="w-full px-3 py-2 border border-green-200 rounded font-mono text-lg bg-green-50 text-green-700 {% if !as_enum().is_auto() %} hidden {% endif %}">
                                51 | Auto
                            </div>

                            <!-- View C: Manual Input - Hide if NOT manual -->
                            <div id="view-manual" class="flex gap-2 items-center {% if !as_enum().is_manual() %} hidden {% endif %}">
                                <input type="number"
                                       id="manual-input"
                                       min="1"
                                       max="50"
                                       value="{{ initial_manual_mem() }}"
                                       oninput="weldControl.updateManual(this.value)"
                                       class="flex-1 px-3 py-2 border border-blue-300 rounded font-mono text-lg
                                                  focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-700">
                                <span class="text-slate-600 font-mono">s</span>
                            </div>
                        </div>
                    </label>

                    <button type="submit"
                            class="w-full mt-3 px-4 py-2 bg-blue-600 text-white rounded font-medium hover:bg-blue-700 transition-colors shadow-sm">
                        Write Value
                    </button>
                </div>
            </form>

            <script>
                // Encapsulated logic to manage the single integer state
                window.weldControl = (function() {
                    const submitInput = document.getElementById('submission_value');
                    const manualInput = document.getElementById('manual-input');

                    // DOM Elements for UI switching
                    const views = {
                        off: document.getElementById('view-off'),
                        auto: document.getElementById('view-auto'),
                        manual: document.getElementById('view-manual')
                    };

                    const btns = {
                        off: document.getElementById('btn-off'),
                        auto: document.getElementById('btn-auto'),
                        manual: document.getElementById('btn-manual')
                    };

                    // Initialize memory from server-rendered value
                    let lastManualVal = parseInt(manualInput.value) || 5;

                    function setVal(num) {
                        const val = parseInt(num);

                        // Robustness check: if clicking the mode we are already in, do nothing
                        const current = parseInt(submitInput.value);
                        const isManualRange = val > 0 && val < 51;
                        const currentIsManual = current > 0 && current < 51;

                        if (val === 0 && current === 0) return;
                        if (val === 51 && current === 51) return;
                        if (isManualRange && currentIsManual) return;

                        // Update Source of Truth
                        submitInput.value = val;

                        // Update Visuals based on integer value
                        // Reset all to hidden/inactive first
                        views.off.classList.add('hidden');
                        views.auto.classList.add('hidden');
                        views.manual.classList.add('hidden');

                        btns.off.setAttribute('data-active', 'false');
                        btns.auto.setAttribute('data-active', 'false');
                        btns.manual.setAttribute('data-active', 'false');

                        if (val === 0) {
                            views.off.classList.remove('hidden');
                            btns.off.setAttribute('data-active', 'true');
                        } else if (val === 51) {
                            views.auto.classList.remove('hidden');
                            btns.auto.setAttribute('data-active', 'true');
                        } else {
                            // Manual Mode
                            views.manual.classList.remove('hidden');
                            btns.manual.setAttribute('data-active', 'true');

                            // Ensure input matches state
                            manualInput.value = val;

                            // Focus UX
                            setTimeout(() => manualInput.focus(), 50);
                        }
                    }

                    return {
                        setVal: setVal,

                        clickManual: function() {
                            setVal(lastManualVal);
                        },

                        updateManual: function(valStr) {
                            let val = parseInt(valStr);
                            if (!isNaN(val) && val > 0 && val < 51) {
                                lastManualVal = val;
                                submitInput.value = val;
                            }
                        }
                    };
                })();
            </script>
        </div>

        <div class="bg-slate-50 p-3 rounded-b-lg border-t border-slate-100 text-right">
            <button onclick="document.getElementById('global-modal-layer').innerHTML = ''"
                    class="px-4 py-2 bg-white border border-slate-300 rounded text-sm font-medium hover:bg-slate-100 transition-colors">
                Cancel
            </button>
        </div>
    </div>
</div>
