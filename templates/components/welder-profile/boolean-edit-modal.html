<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4"
     id="modal-backdrop"
     hx-preserve="true">

    <div class="absolute inset-0" onclick="document.getElementById('global-modal-layer').innerHTML = ''"></div>

    <div class="relative bg-white rounded-lg shadow-2xl w-full max-w-md border border-slate-300 z-10 animate-in fade-in zoom-in duration-200">

        <div class="flex justify-between items-center p-4 border-b border-slate-100 bg-slate-50 rounded-t-lg">
            <h3 class="font-bold font-mono text-lg text-slate-800">{{ meta.name }}</h3>
            <button onclick="document.getElementById('global-modal-layer').innerHTML = ''"
                    class="text-slate-400 hover:text-red-500 font-bold px-2 text-xl">&times;</button>
        </div>

        <div class="p-4 space-y-4">
            <div>
                <span class="text-xs font-bold uppercase text-slate-400 tracking-wider">Description</span>
                <p class="text-sm text-slate-700 leading-relaxed mt-1">
                    {{ meta.description }}
                </p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-50 p-2 rounded border border-slate-200">
                    <span class="text-xs font-bold uppercase text-slate-400">Type</span>
                    <div class="font-mono text-sm">{{ meta.address.register_type }}</div>
                </div>
                <div class="bg-slate-50 p-2 rounded border border-slate-200">
                    <span class="text-xs font-bold uppercase text-slate-400">Address</span>
                    <div class="font-mono text-sm">{{ meta.address.address }}</div>
                </div>
            </div>

            <div class="bg-blue-50 p-3 rounded border border-blue-200">
                <span class="text-xs font-bold uppercase text-slate-600 tracking-wider">Current Value</span>
                <div class="font-bold text-lg mt-1">
{% if let Some(true) = current_value %}
                    <span class="text-green-700">ON</span>
{% else if let Some(false) = current_value %}
                    <span class="text-slate-400">OFF</span>
{% else %}
                    <span class="text-gray-400">---</span>
{% endif %}
                </div>
            </div>

            <form hx-post="/welder-profile/write/{{ register_name }}"
                  hx-swap="none"
                  onsubmit="setTimeout(() => document.getElementById('global-modal-layer').innerHTML = '', 100)">
                <div class="flex gap-2">
                    <button type="submit" name="value" value="false"
                            class="flex-1 px-4 py-3 bg-slate-100 border border-slate-300 rounded text-lg font-bold hover:bg-slate-200 transition-colors">
                        OFF
                    </button>
                    <button type="submit" name="value" value="true"
                            class="flex-1 px-4 py-3 bg-green-100 border border-green-300 rounded text-lg font-bold hover:bg-green-200 transition-colors text-green-700">
                        ON
                    </button>
                </div>
            </form>
        </div>

        <div class="bg-slate-50 p-3 rounded-b-lg border-t border-slate-100 text-right">
            <button onclick="document.getElementById('global-modal-layer').innerHTML = ''"
                    class="px-4 py-2 bg-white border border-slate-300 rounded text-sm font-medium hover:bg-slate-100 transition-colors">
                Cancel
            </button>
        </div>
    </div>
</div>
