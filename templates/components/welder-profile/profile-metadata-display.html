<div class="w-full bg-white rounded-lg shadow-sm border border-slate-300 p-5 mb-4">
    <div class="flex flex-col md:flex-row gap-6 items-start md:justify-between">

        <div class="md:w-1/4 flex-shrink-0">
                <span class="block text-xs font-bold uppercase text-slate-500 tracking-wider mb-2">
                    Profile Name
                </span>
            <div class="font-mono text-lg text-slate-800 break-all">
                {%- if let Some(name) = &name -%}
                {{ name }}
                {%- else -%}
                <span class="text-slate-400 italic">Unnamed Profile</span>
                {%- endif -%}
            </div>
        </div>

        <div class="w-full md:w-3/4 md:max-w-5xl">
            <div class="flex items-baseline gap-2 mb-2">
                    <span class="text-xs font-bold uppercase text-slate-500 tracking-wider">
                        Description
                    </span>
                <span class="text-[10px] text-slate-400 font-normal">
                        (Click text to edit)
                    </span>
            </div>

            <div hx-get="/welder-profile/edit-description"
                 hx-target="#global-modal-layer"
                 hx-swap="innerHTML"
                 class="w-full max-h-32 overflow-y-scroll rounded-md border border-slate-200 bg-slate-50 shadow-inner px-3 py-2 cursor-pointer hover:bg-white hover:border-blue-400 hover:shadow-md transition-all">
                <div class="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap font-sans min-h-5">
                    {%- if let Some(desc) = &description -%}{{ desc }}{%- else -%}<span class="text-slate-400 italic select-none">No description provided</span>{%- endif -%}
                </div>
            </div>
        </div>
    </div>
</div>
