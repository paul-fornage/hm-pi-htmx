<div class="fixed inset-0 z-50 flex items-start pt-20 justify-center bg-black/60 backdrop-blur-sm p-4"
     id="modal-backdrop"
     hx-preserve="true">

    <div class="absolute inset-0" onclick="document.getElementById('global-modal-layer').innerHTML = ''"></div>

    <div class="relative bg-white rounded-lg shadow-2xl w-full max-w-2xl border border-slate-300 z-10 animate-in fade-in zoom-in duration-200">

        <div class="flex justify-between items-center p-4 border-b border-slate-100 bg-slate-50 rounded-t-lg">
            <h3 class="font-bold text-lg text-slate-800">Edit Profile Description</h3>
            <button onclick="document.getElementById('global-modal-layer').innerHTML = ''"
                    class="text-slate-400 hover:text-red-500 font-bold px-2 text-xl">&times;</button>
        </div>

        <form hx-post="{{ base_url }}/update-description"
              hx-target="#profile-metadata"
              hx-swap="innerHTML"
              onsubmit="setTimeout(() => document.getElementById('global-modal-layer').innerHTML = '', 100)">
            <div class="p-4 space-y-4">
                <div>
                    <label for="description" class="text-xs font-bold uppercase text-slate-400 tracking-wider block mb-2">
                        Description
                    </label>
                    <textarea id="description"
                              data-keyboard="text"
                              name="description"
                              rows="16"
                              class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 font-sans text-sm"
                              placeholder="Enter profile description...">{{ current_description.as_deref().unwrap_or("") }}</textarea>
                </div>

                <div class="bg-blue-50 p-3 rounded border border-blue-200">
                    <p class="text-xs text-slate-600">
                        The description is not saved until you click the Save button.
                    </p>
                </div>
            </div>

            <div class="bg-slate-50 p-3 rounded-b-lg border-t border-slate-100 flex justify-end gap-2">
                <button type="button"
                        onclick="document.getElementById('global-modal-layer').innerHTML = ''"
                        class="px-4 py-2 bg-white border border-slate-300 rounded text-sm font-medium hover:bg-slate-100 transition-colors">
                    Cancel
                </button>
                <button type="submit"
                        class="px-4 py-2 bg-blue-600 text-white rounded text-sm font-medium hover:bg-blue-700 transition-colors">
                    Save
                </button>
            </div>
        </form>
    </div>
</div>
