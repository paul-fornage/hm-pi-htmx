<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-xl p-6 max-w-md w-full mx-4">
        <div class="flex justify-between items-start mb-4">
            <h2 class="text-xl font-bold text-gray-800">Edit {{ register_name }}</h2>
            <button 
                hx-on:click="document.getElementById('clearcore-modal-layer').innerHTML = ''"
                class="text-gray-500 hover:text-gray-700 text-2xl leading-none">
                &times;
            </button>
        </div>

        <div class="mb-4">
            <p class="text-sm text-gray-600">{{ register_info.meta.description }}</p>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-2">Current Value:</label>
            <div class="text-lg font-semibold {% if current_value.is_some() %}text-gray-900{% else %}text-red-500{% endif %}">
                {{ formatted_current_value() }}
            </div>
        </div>

        <form 
            hx-post="/clearcore-config/write/{{ register_name }}"
            hx-target="#write-error-{{ register_name }}"
            hx-on::after-request="if(event.detail.successful) { document.getElementById('clearcore-modal-layer').innerHTML = '' }">
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    New Value ({{ register_info.units }}):
                </label>
                <input 
                    type="number" 
                    name="value" 
                    step="{% if register_info.decimal_places > 0 %}0.{% for _ in 1..register_info.decimal_places %}0{% endfor %}1{% else %}1{% endif %}"
                    value="{{ semantic_value() }}"
                    {% if register_info.semantic_min.is_some() %}min="{{ min_value() }}"{% endif %}
                    {% if register_info.semantic_max.is_some() %}max="{{ max_value() }}"{% endif %}
                    class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                {% if register_info.semantic_min.is_some() || register_info.semantic_max.is_some() %}
                <p class="text-xs text-gray-500 mt-1">
                    Range: {{ min_value() }} to {{ max_value() }} {{ register_info.units }}
                </p>
                {% endif %}
            </div>

            <div id="write-error-{{ register_name }}" class="mb-4"></div>

            <div class="flex justify-end gap-2">
                <button 
                    type="button"
                    hx-on:click="document.getElementById('clearcore-modal-layer').innerHTML = ''"
                    class="px-4 py-2 bg-gray-300 text-gray-800 rounded hover:bg-gray-400">
                    Cancel
                </button>
                <button 
                    type="submit"
                    class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
                    Write Value
                </button>
            </div>
        </form>
    </div>
</div>
