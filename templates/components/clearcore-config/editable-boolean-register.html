<div class="bg-white p-4 rounded shadow hover:shadow-md transition-shadow border-l-4 border-blue-500">
    <div class="flex justify-between items-start mb-2">
        <div class="flex-1">
            <h3 class="font-semibold text-gray-800">{{ meta.name }}</h3>
            <p class="text-xs text-gray-600 mt-1">{{ meta.description }}</p>
        </div>
        <button 
            hx-get="/clearcore-config/edit/{{ meta.name }}"
            hx-target="#clearcore-modal-layer"
            class="ml-2 px-3 py-1 bg-blue-500 text-white text-sm rounded hover:bg-blue-600 flex-shrink-0">
            Edit
        </button>
    </div>
    <div class="mt-2 text-sm">
        <span class="font-medium text-gray-700">Value:</span>
        <span class="ml-2 {% if value.is_some() %}{% if value.unwrap() %}text-green-600{% else %}text-gray-600{% endif %}{% else %}text-red-500{% endif %}">
            {% match value %}
                {% when Some with (true) %}TRUE
                {% when Some with (false) %}FALSE
                {% when None %}---
            {% endmatch %}
        </span>
    </div>
</div>
