<form hx-post="/machine-config/save" hx-target="#status-message" hx-swap="innerHTML">
    <div class="bg-white p-6 rounded shadow">
        <div class="mb-4">
            <label for="welder_model" class="block text-sm font-medium mb-2">Welder Model</label>
            <select
                id="welder_model"
                name="welder_model"
                class="w-full p-2 border border-gray-300 rounded">
                {% include "components/machine_config/welder-model-options.html" %}
            </select>
        </div>

        <div class="mb-4">
            <div class="flex-1">
                <label for="udp_logging_port" class="block text-sm">UDP Logging Port</label>
                <input type="text"
                       inputmode="numeric"
                       data-keyboard="float"
                       id="udp_logging_port"
                       name="udp_logging_port"
                       value="{{ udp_logging_port }}"
                       min="1"
                       max="65535"
                       class="border p-1 rounded"
                       required>
            </div>
        </div>

        <button
            type="submit"
            class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded">
            Save Configuration
        </button>
    </div>
</form>
