<header class="flex justify-between items-center mb-5">
    <div class="flex gap-6 items-center">
        <h1 class="text-2xl font-bold">My Modbus App</h1>
        <!-- Reusing your existing endpoint for status -->
        <span id="modbus-status" hx-get="/modbus/status" hx-trigger="load, every 100ms" hx-swap="innerHTML">
            Loading status...
        </span>
    </div>
</header>

<nav class="flex border-b-2 border-gray-300 mb-5 gap-1">
    <!-- call self.all_views() to get the list -->
    {% for tab in Self::all_views() %}
    <a href="{{ tab.url() }}"
       class="px-5 py-2.5 ... 
           {# call self.current_view() to check equality #}
           {% if tab == Self::get_view() %}
             !bg-white !text-blue-600 !border-gray-300 !border-b-white !font-bold -mb-0.5
           {% endif %}">
        {{ tab.label() }}
    </a>
    {% endfor %}
</nav>
