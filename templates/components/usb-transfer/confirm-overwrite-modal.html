<div id="usb-transfer-modal" hx-swap-oob="innerHTML">
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
        <div class="absolute inset-0" onclick="document.getElementById('usb-transfer-modal').innerHTML = ''"></div>

        <div class="relative w-[90vw] max-w-lg rounded-lg border border-slate-300 bg-white shadow-2xl">
            <div class="flex items-center justify-between px-5 py-4 border-b border-slate-200 bg-slate-50 rounded-t-lg">
                <h2 class="text-lg font-bold text-slate-800">Confirm overwrite</h2>
                <button
                    type="button"
                    onclick="document.getElementById('usb-transfer-modal').innerHTML = ''"
                    class="text-slate-400 hover:text-red-500 font-bold px-2 text-2xl leading-none">
                    &times;
                </button>
            </div>

            <form
                hx-post="/usb-transfer/copy"
                hx-target="#usb-transfer-toast"
                hx-swap="innerHTML"
                class="p-5 space-y-4">
                <input type="hidden" name="file_name" value="{{ form.file_name }}" />
                <input type="hidden" name="subdir" value="{{ form.subdir }}" />
                <input type="hidden" name="direction" value="{{ form.direction.form_value() }}" />
                <input type="hidden" name="usb_mountpoint" value="{{ form.usb_mountpoint }}" />
                <input type="hidden" name="force" value="true" />

                <div class="text-sm text-slate-700">
                    <div class="font-semibold text-slate-800">{{ form.file_name }}</div>
                    <div class="mt-1">This file already exists on {{ destination_label }}. Overwriting will replace the existing file.</div>
                </div>

                <div class="flex justify-end gap-2 pt-2">
                    <button
                        type="button"
                        onclick="document.getElementById('usb-transfer-modal').innerHTML = ''"
                        class="px-4 py-2 border border-slate-300 rounded text-slate-700 hover:bg-slate-50">
                        Cancel
                    </button>
                    <button
                        type="submit"
                        hx-indicator="this"
                        hx-disabled-elt="this"
                        class="group px-4 py-2 bg-red-600 text-white rounded font-semibold hover:bg-red-700 disabled:opacity-50 disabled:cursor-not-allowed">
                        <span class="group-[.htmx-request]:hidden">Overwrite</span>
                        <span class="hidden group-[.htmx-request]:inline">Overwriting...</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
