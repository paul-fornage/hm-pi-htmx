<div class="fixed inset-0 pt-20 bg-black/50 flex items-start justify-center z-50">
<!--    <div class="absolute inset-0" onclick="document.getElementById('user-edit-modal').innerHTML = ''"></div>-->

    <div class="bg-white p-6 rounded-lg shadow-lg w-96">
        <h3 class="text-lg font-bold mb-4">
            {% match user %}
            {% when Some with (_) %} Edit User
            {% when None %} Add User
            {% endmatch %}
        </h3>
        <form hx-post="{% match user %}{% when Some with (_) %}/users/edit{% when None %}/users/add{% endmatch %}"
              hx-target="#users-action-status"
              hx-swap="innerHTML"
              hx-on::after-request="closeModal()"
              class="space-y-4">

            {% match user %}
            {% when Some with (u) %}
            <input type="hidden" name="original_username" value="{{ u.username }}">
            {% when None %}
            {% endmatch %}

            <div>
                <label class="block text-sm font-medium mb-1">Username</label>
                <input type="text"
                       data-keyboard="text"
                       name="username"
                       required
                       autocomplete="off"
                       value="{% match user %}{% when Some with (u) %}{{ u.username }}{% when None %}{% endmatch %}"
                       class="w-full px-3 py-2 border rounded">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Password</label>
                <input type="text"
                       data-keyboard="text"
                       name="password"
                       required
                       autocomplete="off"
                       value="{% match user %}{% when Some with (u) %}{{ u.password }}{% when None %}{% endmatch %}"
                       class="w-full px-3 py-2 border rounded">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Level</label>
                <select name="level" class="w-full px-3 py-2 border rounded">
                    <option value="manager" {% match user %}{% when Some with (u) %}{% if u.is_manager() %}selected{% endif %}{% when None %}{% endmatch %}>Manager</option>
                    <option value="admin" {% match user %}{% when Some with (u) %}{% if u.is_admin() %}selected{% endif %}{% when None %}{% endmatch %}>Admin</option>
                </select>
            </div>

            <div class="flex justify-end gap-2 mt-6">
                <button type="button" onclick="closeModal()" class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300">Cancel</button>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Save</button>
            </div>
        </form>
    </div>
</div>
