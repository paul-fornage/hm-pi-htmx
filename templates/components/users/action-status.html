<div id="users-action-status" hx-swap-oob="true">
    <div class="mb-4 p-3 rounded border {% if self.is_ok() %}bg-green-100 border-green-400 text-green-700{% else %}bg-red-100 border-red-400 text-red-700{% endif %}">
        {{ self.message() }}
    </div>
    <script>
        setTimeout(() => {
            const statusDiv = document.getElementById('users-action-status');
            if (statusDiv) statusDiv.innerHTML = '';
        }, 4000);
    </script>
</div>
