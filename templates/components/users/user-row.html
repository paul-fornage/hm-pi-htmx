<tr class="border-t border-gray-200">
    <td class="p-2">{{ user.username }}</td>
    <td class="p-2">
        <div class="flex items-center gap-2">
            <input
                    type="password"
                    readonly value="{{ user.password }}"
                    class="bg-transparent border-none outline-none text-gray-700 w-full cursor-default">
            <button type="button" onclick="togglePassword(this)" class="text-xs px-2 py-1 bg-gray-200 rounded hover:bg-gray-300">Show</button>
        </div>
    </td>
    <td class="p-2 capitalize">
        {% if user.is_manager() %}Manager{% else %}Admin{% endif %}
    </td>
    <td class="p-2 text-right space-x-2">
        <button type="button"
                hx-get="/users/modal/edit?username={{ user.username }}"
                hx-target="#user-edit-modal"
                class="px-2 py-1 bg-gray-200 rounded hover:bg-gray-300">Edit</button>
        <button type="button"
                hx-delete="/users/delete?username={{ user.username }}"
                hx-target="#users-action-status"
                hx-swap="innerHTML"
                hx-confirm="Are you sure you want to delete {{ user.username }}?"
                class="px-2 py-1 bg-red-100 text-red-700 rounded hover:bg-red-200">Delete</button>
    </td>
</tr>
