{% macro render(axis, direction) %}
<button
    type="button"
    hx-post="/clearcore-manual-control/jog/{{ axis }}/{{ direction }}"
    hx-trigger="mousedown, touchstart"
    hx-vals='{"active": true}'
    hx-target="#jog-feedback-{{ axis }}"
    hx-swap="innerHTML"
    hx-on:mouseup="htmx.ajax('POST', '/clearcore-manual-control/jog/{{ axis }}/{{ direction }}', {target: '#jog-feedback-{{ axis }}', values: {active: false}})"
    hx-on:mouseleave="htmx.ajax('POST', '/clearcore-manual-control/jog/{{ axis }}/{{ direction }}', {target: '#jog-feedback-{{ axis }}', values: {active: false}})"
    hx-on:touchend="htmx.ajax('POST', '/clearcore-manual-control/jog/{{ axis }}/{{ direction }}', {target: '#jog-feedback-{{ axis }}', values: {active: false}})"
    hx-on:touchcancel="htmx.ajax('POST', '/clearcore-manual-control/jog/{{ axis }}/{{ direction }}', {target: '#jog-feedback-{{ axis }}', values: {active: false}})"
    class="h-10 px-3 text-sm font-bold bg-slate-200 text-slate-700 rounded hover:bg-slate-300">
  {{ direction|capitalize }}
</button>
{% endmacro %}
