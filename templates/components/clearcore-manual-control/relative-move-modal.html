<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4"
     id="modal-backdrop">

  <div class="absolute inset-0" onclick="document.getElementById('global-modal-layer').innerHTML = ''"></div>

  <div class="relative bg-white rounded-lg shadow-2xl w-full max-w-md border border-slate-300 z-10 animate-in fade-in zoom-in duration-200">
    <div class="flex justify-between items-center p-4 border-b border-slate-100 bg-slate-50 rounded-t-lg">
      <h3 class="font-bold font-mono text-lg text-slate-800">Jog by Relative Amount</h3>
      <button onclick="document.getElementById('global-modal-layer').innerHTML = ''"
              class="text-slate-400 hover:text-red-500 font-bold px-2 text-xl">&times;</button>
    </div>

    <div class="p-4 space-y-4">
      <div>
        <span class="text-xs font-bold uppercase text-slate-400 tracking-wider">{{ axis_label }}</span>
        <p class="text-sm text-slate-700 leading-relaxed mt-1">
          Enter a relative move in inches. Positive moves advance, negative moves retract.
          Range is -12.00 to +12.00 inches.
        </p>
      </div>

      <form hx-post="{{ post_url }}"
            hx-swap="innerHTML"
            hx-target="{{ feedback_target }}"
            hx-disabled-elt="#relative-move-submit">
        <label class="block">
          <span class="text-sm font-bold text-slate-700">Relative Move</span>
          <div class="flex gap-2 items-center mt-1">
            <input type="number"
                   inputmode="decimal"
                   data-keyboard="float"
                   autocomplete="off"
                   name="value"
                   step="0.01"
                   min="-12.00"
                   max="12.00"
                   value="5.00"
                   required
                   class="peer flex-1 px-3 py-2 border border-slate-300 rounded font-mono text-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors invalid:border-orange-500 invalid:ring-2 invalid:ring-orange-200">
            <span class="text-slate-600 font-mono">in</span>
          </div>
        </label>
        <div class="mt-2 text-xs font-semibold text-orange-600 hidden peer-invalid:block peer-placeholder-shown:hidden">
          Enter a value between -12.00 and 12.00 inches.
        </div>
        <button type="submit"
                id="relative-move-submit"
                class="w-full mt-3 px-4 py-2 bg-blue-600 text-white rounded font-medium hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center gap-2">
          <span>Command Move</span>
          <svg class="htmx-indicator animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </button>
      </form>

    </div>

    <div class="bg-slate-50 p-3 rounded-b-lg border-t border-slate-100 text-right">
      <button onclick="document.getElementById('global-modal-layer').innerHTML = ''"
              class="px-4 py-2 bg-white border border-slate-300 rounded text-sm font-medium hover:bg-slate-100 transition-colors">
        Close
      </button>
    </div>
  </div>
</div>
