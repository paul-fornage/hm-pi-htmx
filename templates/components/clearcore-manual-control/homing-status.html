<div class="flex flex-col gap-2">
  <div class="flex items-center justify-between">
    <span class="text-sm font-semibold text-slate-700">Homing status</span>
    {% if let Some(_) = error %}
      <span class="inline-flex items-center gap-2 px-2 py-1 rounded-full text-xs font-semibold bg-red-100 text-red-700">Unavailable</span>
    {% elif is_homing %}
      <span class="inline-flex items-center gap-2 px-2 py-1 rounded-full text-xs font-semibold bg-amber-100 text-amber-800">Homing</span>
    {% elif is_homed %}
      <span class="inline-flex items-center gap-2 px-2 py-1 rounded-full text-xs font-semibold bg-emerald-100 text-emerald-800">Homed</span>
    {% else %}
      <span class="inline-flex items-center gap-2 px-2 py-1 rounded-full text-xs font-semibold bg-slate-100 text-slate-700">Not homed</span>
    {% endif %}
  </div>
  <div class="min-h-[1rem] text-xs font-medium">
    {% if let Some(message) = error %}
      <span class="text-red-600">{{ message }}</span>
    {% elif is_homed && !is_homing %}
      <span class="text-amber-700">Already homed. Re-homing resets position.</span>
    {% endif %}
  </div>
  <button
    hx-post="/clearcore-manual-control/home-axes"
    hx-target="#homing-control"
    hx-indicator="this"
    hx-disabled-elt="this"
    class="group h-10 w-full px-3 text-sm bg-blue-600 text-white rounded transition-colors disabled:opacity-50 disabled:cursor-not-allowed font-bold hover:bg-blue-700"
    {% if is_homing || error.is_some() %}disabled{% endif %}>
    <span class="{% if is_homing %}hidden{% else %}inline{% endif %} group-[.htmx-request]:hidden">
      {% if is_homed %}Re-home axes{% else %}Home all axes{% endif %}
    </span>
    <span class="{% if is_homing %}inline{% else %}hidden{% endif %} group-[.htmx-request]:inline">Homing...</span>
  </button>
</div>
