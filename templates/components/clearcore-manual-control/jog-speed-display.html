<div class="flex items-center gap-2">
  <label class="text-sm font-semibold text-slate-600">Speed</label>
  <div class="flex items-center gap-1 flex-1">
    <input
      type="text"
      value="{{ speed_display }}"
      autocomplete="off"
      disabled
      class="w-full h-9 px-2 text-sm border border-slate-300 rounded bg-slate-100 text-slate-800 font-mono opacity-70 cursor-not-allowed">
    <span class="text-xs font-mono text-slate-500">in/min</span>
  </div>
  <button
    type="button"
    hx-get="/clearcore-manual-control/jog-speed/{{ axis_slug }}"
    hx-target="#global-modal-layer"
    hx-swap="innerHTML"
    class="h-9 px-3 text-xs font-bold bg-slate-800 text-white rounded hover:bg-slate-900">
    Change
  </button>
</div>
{% if let Some(message) = error %}
  <div class="mt-2 text-xs font-semibold text-red-600">{{ message }}</div>
{% endif %}
