<div class="flex flex-col border border-slate-300 rounded shadow-sm bg-white overflow-hidden w-32">
    <!-- The Value: Big and Visual -->
    <div class="h-12 flex items-center justify-center font-bold text-xl
                {% if value %} bg-green-100 text-green-700 {% else %} bg-slate-100 text-slate-400 {% endif %}">
        {% if value %} ON {% else %} OFF {% endif %}
    </div>


    <button
            class="text-xs font-mono py-1 px-2 text-center hover:bg-blue-50 hover:text-blue-600 transition-colors cursor-pointer border-t border-slate-200"
            hx-get="/ui/modal/{{ meta.name }}"
            hx-target="#global-modal-layer"
            hx-swap="innerHTML">
        {{ meta.name }}
    </button>
</div>
