<div id="global-sse-connection">
    <div id="sse-toast-container"
         class="toast-container fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"
         sse-swap="error-toast"
         hx-swap="beforeend">
    </div>
</div>

<script>
    document.body.addEventListener('htmx:sseMessage', function (e) {
        if (e.detail.type === 'error-toast') {
            const container = document.getElementById('sse-toast-container');
            if (container && container.children.length >= 4) {
                container.firstElementChild.remove();
            }
        }
    });
</script>
