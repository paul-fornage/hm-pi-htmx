{% extends "base-edit-modal.html" %}

{% block content %}
<div class="grid grid-cols-2 gap-4">
    <div class="bg-slate-50 p-2 rounded border border-slate-200">
        <span class="text-xs font-bold uppercase text-slate-400">Min</span>
        <div class="font-mono text-sm">{{ display_min_value() }}</div>
    </div>
    <div class="bg-slate-50 p-2 rounded border border-slate-200">
        <span class="text-xs font-bold uppercase text-slate-400">Max</span>
        <div class="font-mono text-sm">{{ display_max_value() }}</div>
    </div>
</div>

<div class="bg-blue-50 p-3 rounded border border-blue-200">
    <span class="text-xs font-bold uppercase text-slate-600 tracking-wider">Current Value</span>
    <div class="font-bold text-lg mt-1 text-slate-700">
        {% if let Some(val) = current_semantic_value() %}
        {{ current_display_value() }}
        {% else %}
        <span class="text-gray-400">---</span>
        {% endif %}
    </div>
</div>

<form hx-post="write_value_url()"
      hx-swap="innerHTML"
      hx-target="#global-modal-layer"
      hx-disabled-elt="#write-btn">
    <label class="block">
        <span class="text-sm font-bold text-slate-700">New Value</span>
        <div class="flex gap-2 items-center mt-1">
            <input type="number"
                   name="value"
                   step="{{ step() }}"
                   min="{{ semantic_min() }}"
                   max="{{ semantic_max() }}"
                   {% if let Some(val) = current_semantic_value() %}
                   value="{{ val }}"
                   {% endif %}
                   required
                   class="flex-1 px-3 py-2 border border-slate-300 rounded font-mono text-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <span class="text-slate-600 font-mono">{{ register_info.unit }}</span>
        </div>
    </label>
    <button type="submit"
            id="write-btn"
            class="w-full mt-3 px-4 py-2 bg-blue-600 text-white rounded font-medium hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center gap-2">
        <span>Write Value</span>
        <svg class="htmx-indicator animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
    </button>
</form>
{% endblock %}
