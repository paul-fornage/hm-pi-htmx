<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4"
     id="modal-backdrop">

    <!-- Clicking backdrop closes the modal (clears the layer) -->
    <div class="absolute inset-0" onclick="document.getElementById('global-modal-layer').innerHTML = ''"></div>

    <div class="relative bg-white rounded-lg shadow-2xl w-full max-w-sm border border-red-200 z-10 animate-in fade-in zoom-in duration-200">
        <!-- Header -->
        <div class="flex justify-between items-center p-4 border-b border-red-100 bg-red-50 rounded-t-lg">
            <h3 class="font-bold text-lg text-red-800">{{ title }}</h3>
            <button onclick="document.getElementById('global-modal-layer').innerHTML = ''"
                    class="text-red-400 hover:text-red-700 font-bold px-2 text-xl">&times;</button>
        </div>

        <!-- Body -->
        <div class="p-6 text-center">
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4">
                <svg class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
                </svg>
            </div>
            <p class="text-sm text-slate-700 leading-relaxed font-mono">
                {{ message }}
            </p>
        </div>

        <!-- Footer -->
        <div class="bg-slate-50 p-3 rounded-b-lg border-t border-slate-100 text-center">
            <button onclick="document.getElementById('global-modal-layer').innerHTML = ''"
                    class="w-full px-4 py-2 bg-white border border-slate-300 rounded text-sm font-bold text-slate-700 hover:bg-slate-100 transition-colors">
                Close
            </button>
        </div>
    </div>
</div>
