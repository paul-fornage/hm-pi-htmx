
<span class="text-sm font-semibold text-slate-700">Status feedback</span>
<div class="mt-2 flex flex-wrap justify-between gap-2 bg-slate-50 p-2 rounded border border-slate-200">
    <span class="text-sm font-semibold text-slate-700">Mandrel latch</span>
    {% if let Some(val) = mandrel_latch_closed %}
    <span class="inline-flex items-center rounded-full px-2.5 py-1 text-xs font-semibold {% if val %}bg-emerald-100 text-emerald-800{% else %}bg-amber-100 text-amber-800{% endif %}">
        {% if val %}Closed{% else %}Open{% endif %}
    </span>
    {% else %}
    <span class="inline-flex items-center rounded-full bg-slate-100 px-2.5 py-1 text-xs font-semibold text-slate-600">
        Unknown
    </span>
    {% endif %}
</div>
