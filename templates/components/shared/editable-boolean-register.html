{% extends "components/shared/base-editable-register-card.html" %}

{% block edit_url %}{{ open_modal_url() }}{% endblock %}

{% block display_value %}
<div class="h-8 w-full flex items-center justify-center font-bold text-xl bg-slate-100
{% if let Some(true) = value %} text-green-900
{% else if let Some(false) = value %} text-slate-700
{% else %} text-gray-400 {% endif %}">
    {{as_string()}}
</div>
{% endblock %}

{% block register_name_text %}{{ register_info.meta.name }}{% endblock %}
