<div class="flex flex-col border border-slate-300 rounded shadow-sm bg-white overflow-hidden w-40">
    <!-- The Value: Big and Visual -->
    <div class="h-12 flex items-center justify-center font-bold text-xl
                {% if value.is_some() %} bg-slate-100 text-slate-400
                {% else %} bg-gray-100 text-gray-400 {% endif %}">
        {% match value %}
        {% when Some with (val) %}
        {{ val }}
        {% when None %}
        ---
        {% endmatch %}
    </div>

    <button
            class="text-xs font-mono py-1 px-2 text-center hover:bg-blue-50 hover:text-blue-600 transition-colors cursor-pointer border-t border-slate-200 truncate"
            hx-get="/ui/modal/{{ meta.name }}"
            hx-target="#global-modal-layer"
            hx-swap="innerHTML">
        {{ meta.name }}
    </button>
</div>
