<div class="toast toast-error pointer-events-auto cursor-pointer bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative shadow-md"
     role="alert"
     onclick="this.remove()">
    <div class="toast-body">
        <strong class="font-bold">Error:</strong>
        {{ msg }}
    </div>
</div>
