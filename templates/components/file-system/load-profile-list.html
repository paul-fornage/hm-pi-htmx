{% match result %}
{% when Ok with (profiles) %}
    {% if profiles.is_empty() %}
    <div class="flex items-center justify-center h-full">
        <div class="text-slate-400 text-sm text-center py-12">
            <div class="text-2xl mb-2">📁</div>
            <div>No profiles found</div>
        </div>
    </div>
    {% else %}
    {% for profile in profiles %}
    <div
        hx-get="{{ base_url }}/fs/load/preview?name={{ profile.name }}"
        hx-target="#load-preview"
        class="px-4 py-3 cursor-pointer border-b border-slate-200 last:border-b-0 hover:bg-blue-50 transition-colors">
        <div class="font-semibold text-sm text-slate-800 mb-1">{{ profile.name }}</div>
        <div class="text-xs text-slate-500 line-clamp-2">{{ profile.description }}</div>
    </div>
    {% endfor %}
    {% endif %}
{% when Err with (error_msg) %}
    <div class="flex items-center justify-center h-full">
        <div class="text-red-600 text-sm text-center py-12 px-4">
            <div class="text-2xl mb-2">⚠️</div>
            <div class="font-semibold mb-1">Error Loading Profiles</div>
            <div class="text-xs text-red-500">{{ error_msg }}</div>
        </div>
    </div>
{% endmatch %}
