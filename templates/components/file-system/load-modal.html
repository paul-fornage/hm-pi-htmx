<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm"
     id="modal-backdrop">

    <div class="absolute inset-0" onclick="document.getElementById('global-modal-layer').innerHTML = ''"></div>

    <div class="relative bg-white rounded-lg shadow-2xl w-[90vw] h-[90vh] max-w-6xl border border-slate-300 z-10 flex flex-col">

        <div class="flex justify-between items-center px-6 py-4 border-b border-slate-200 bg-slate-50 rounded-t-lg shrink-0">
            <h2 class="text-xl font-bold text-slate-800">Manage Saved Profiles</h2>
            <button
                type="button"
                onclick="document.getElementById('global-modal-layer').innerHTML = ''"
                class="text-slate-400 hover:text-red-500 font-bold px-2 text-2xl leading-none transition-colors">
                &times;
            </button>
        </div>

        <div class="flex gap-4 flex-1 min-h-0 p-6">
            <div class="flex-1 border border-slate-300 rounded-lg overflow-hidden flex flex-col bg-white shadow-sm">
                <div class="bg-slate-50 px-4 py-3 border-b border-slate-200 shrink-0">
                    <h3 class="text-sm font-semibold text-slate-700 uppercase tracking-wider mb-2">Saved Profiles</h3>
                    <input type="text"
                           inputmode="text"
                           data-keyboard="text"
                           id="load-search-input"
                           name="search"
                           placeholder="Search profiles..."
                           class="w-full px-3 py-2 text-sm border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                           hx-get="{{ base_url }}/fs/load/list"
                           hx-trigger="keyup changed delay:500ms, search"
                           hx-target="#load-profile-list"
                           hx-include="this"
                    />
                </div>
                <div id="load-profile-list"
                     class="flex-1 overflow-y-auto"
                     hx-get="{{ base_url }}/fs/load/list"
                     hx-trigger="load">
                </div>
            </div>

            <div class="flex-1 border border-slate-300 rounded-lg overflow-hidden flex flex-col bg-slate-50 shadow-sm">
                <div class="bg-slate-100 px-4 py-3 border-b border-slate-200 shrink-0">
                    <h3 class="text-sm font-semibold text-slate-700 uppercase tracking-wider">Preview</h3>
                </div>
                <div id="load-preview" class="flex-1 overflow-y-auto p-4">
                    <div class="text-slate-500 text-sm text-center mt-12">Select a profile to preview</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>

// Handle reload-profile-list event to preserve search
document.addEventListener('reload-profile-list', function() {
    const searchInput = document.getElementById('load-search-input');
    const searchValue = searchInput ? searchInput.value : '';
    const url = '{{ base_url }}/fs/load/list' + (searchValue ? '?search=' + encodeURIComponent(searchValue) : '');

    htmx.ajax('GET', url, {
        target: '#load-profile-list',
        swap: 'innerHTML'
    });
});
</script>
