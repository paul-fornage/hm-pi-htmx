{% match self.0 %}
{% when Ok(profile) %}
<div class="flex flex-col h-full">
    <div class="flex-1 overflow-y-auto mb-4">
        <h3 class="text-lg font-bold text-slate-800 mb-3">{{ profile.name }}</h3>
        <div class="text-sm text-slate-600 leading-relaxed whitespace-pre-wrap">{{ profile.description }}</div>
    </div>
    <div class="flex gap-3 shrink-0 pt-4 border-t border-slate-200">
        <button
                hx-post="/welder-profile/fs/load/apply?name={{ profile.name }}"
                hx-target="#profile-fs-op-status"
                hx-disabled-elt="this"
                class="flex-1 px-4 py-2.5 bg-green-600 text-white rounded-md font-medium hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed shadow-sm hover:shadow transition-all">
            Load Profile
        </button>
        <button
                id="delete-profile-btn"
                data-profile-name="{{ profile.name }}"
                hx-delete="/welder-profile/fs/load/delete_confirm?name={{ profile.name }}"
                hx-target="#load-preview"
                hx-swap="innerHTML"
                hx-disabled-elt="this"
                hx-trigger="confirmedDelete"
                onclick="handleDeleteClick(this)"
                class="px-4 py-2.5 bg-red-600 text-white rounded-md font-medium hover:bg-red-700 shadow-sm hover:shadow transition-all">
            Delete
        </button>
    </div>
</div>
{% when Err(error) %}
<div class="flex flex-col h-full justify-center items-center text-center p-4">
    <div class="text-red-600 font-medium mb-1">Error loading profile</div>
    <div class="text-sm text-slate-500">{{ error }}</div>
</div>
{% endmatch %}
